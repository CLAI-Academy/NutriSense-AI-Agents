# cloudbuild.yaml
steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', 
      '-t', 
      'europe-west1-docker.pkg.dev/nutrisense-functions/nutrisense-develop/nutrisense-develop:$COMMIT_SHA',
      '.'
    ]

  # Push the container image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'push', 
      'europe-west1-docker.pkg.dev/nutrisense-functions/nutrisense-develop/nutrisense-develop:$COMMIT_SHA'
    ]

  # Deploy container image to Cloud Run with ALL secrets
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args: [
      'run', 'deploy', 'nutrisense-develop',
      '--image', 'europe-west1-docker.pkg.dev/nutrisense-functions/nutrisense-develop/nutrisense-develop:$COMMIT_SHA',
      '--region', 'europe-west1',
      '--platform', 'managed',
      '--allow-unauthenticated',
      '--memory', '1Gi',
      '--cpu', '1',
      '--min-instances', '0',
      '--max-instances', '10',
      '--timeout', '300',
      '--concurrency', '80',
      '--set-env-vars', 'PYTHONPATH=/app',
      '--set-secrets', 'SUPABASE_URL=supabase_url:latest,SUPABASE_KEY=supabase-key:latest,SUPABASE_SERVICE_ROLE_KEY=supabase-service-role-key:latest,OPENAI_API_KEY=openai-api-key:latest,OPENAI_MODEL=openai-model:latest,ANTHROPIC_API_KEY=anthropic-api-key:latest,ANTHROPIC_MODEL=anthropic-model:latest,GROQ_API_KEY=groq-api-key:latest,GROQ_MODEL=groq-model:latest,LANGSMITH_API_KEY=langsmith-api-key:latest,LANGSMITH_PROJECT=langsmith-project:latest'
    ]

options:
  logging: CLOUD_LOGGING_ONLY

tags: ['nutrisense-develop']
timeout: '1600s'